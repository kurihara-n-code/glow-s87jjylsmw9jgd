<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;

    height: auto;
    margin: 0;
    padding: 0;
    vertical-align: top;
  }

  /* 固定CTAボタン */
  .cta-fixed {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 100;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(253, 248, 245, 0.98) 60%, rgba(253, 248, 245, 0));
    pointer-events: none;
  }
  .cta-button {
    pointer-events: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    padding: 18px 28px;
    background: linear-gradient(135deg, #d6a78a 0%, #c38a6a 50%, #b07555 100%);
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-decoration: none;
    border-radius: 999px;
    box-shadow:
      0 8px 24px rgba(176, 117, 85, 0.35),
      0 2px 6px rgba(176, 117, 85, 0.25),
      inset 0 1px 0 rgba(255, 255, 255, 0.25);
    transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .cta-button::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(255, 255, 255, 0.25) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.6s ease;
  }
  .cta-button:hover {
    transform: translateY(-2px);
    box-shadow:
      0 12px 28px rgba(176, 117, 85, 0.45),
      0 4px 8px rgba(176, 117, 85, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.3);
    filter: brightness(1.05);
  }
  .cta-button:hover::before { transform: translateX(100%); }
  .cta-button:active { transform: translateY(0); }
  .cta-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }
  .cta-arrow {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    opacity: 0.9;
  }

  @media (max-width: 480px) {
    .cta-button {
      padding: 16px 24px;
      font-size: 17px;
      letter-spacing: 0.08em;
    }
  }
</style>
