<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>glow by Fashionista｜毛穴洗浄×小顔ケア専門サロン</title>
<meta name="description" content="ノーファンデでも自信が持てる素肌へ。たった1回で変化を実感。glow by Fashionista 公式LP">
<link rel="preload" as="image" href="images/section1.webp">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    background: #fdf8f5;
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    background: #fff;
  }
  .lp-section {
    display: block;
    width: 100%;
    height: auto;
    margin: 0;
    padding: 0;
    vertical-align: top;
  }

  /* 店舗一覧セクション: 予約ボタンをオーバーレイ */
  .stores {
    position: relative;
    line-height: 0;
  }
  .reserve-btn {
    position: absolute;
    right: 4.5%;
    width: 38%;
    transform: translateY(-50%);
    transition: transform 0.18s ease, filter 0.18s ease;
    filter: drop-shadow(0 3px 8px rgba(220, 80, 120, 0.28));
    line-height: 0;
  }
  .reserve-btn img { display: block; width: 100%; height: auto; }
  .reserve-btn:hover {
    transform: translateY(-50%) scale(1.05);
    filter: drop-shadow(0 5px 12px rgba(220, 80, 120, 0.42)) brightness(1.04);
  }
  .reserve-btn:active {
    transform: translateY(-50%) scale(0.98);
  }

  /* 各店舗の住所中心に合わせた縦位置（画像853×1844基準） */
  .reserve-btn.ebisu      { top: 28.0%; }
  .reserve-btn.ginza      { top: 40.5%; }
  .reserve-btn.omotesando { top: 53.0%; }
  .reserve-btn.shinjuku   { top: 63.7%; }
  .reserve-btn.yokohama   { top: 75.7%; }
  .reserve-btn.osaka      { top: 90.0%; }
</style>
</head>
<body>

<main>
  <img class="lp-section" src="images/section1.webp" alt="glow by Fashionista｜もう、隠さない" width="853" height="1844" fetchpriority="high">
  <img class="lp-section" src="images/section2.webp" alt="たった1回で、変化を実感" loading="lazy" width="853" height="1844">
  <img class="lp-section" src="images/section3.webp" alt="素肌の輝きを引き出す" loading="lazy" width="853" height="1844">
  <img class="lp-section" src="images/section4.webp" alt="つるんと透明感のある鼻へ" loading="lazy" width="853" height="1844">
  <img class="lp-section" src="images/section5.webp" alt="Glowとは" loading="lazy" width="853" height="1844">
  <img class="lp-section" src="images/section6.webp" alt="人気メニュー" loading="lazy" width="853" height="1844">
  <img class="lp-section" src="images/section7.webp" alt="お客様の声" loading="lazy" width="853" height="1844">
  <img class="lp-section" src="images/section8.webp" alt="プラン・料金" loading="lazy" width="853" height="1844">

  <div class="stores">
    <img class="lp-section" src="images/section9.webp" alt="店舗一覧" loading="lazy" width="853" height="1844">

    <!-- 恵比寿店 -->
    <a class="reserve-btn ebisu" href="https://fashionista.skin/ebisu-east/" target="_blank" rel="noopener noreferrer" aria-label="恵比寿店 予約する">
      <img src="images/reserve.webp" alt="予約する" width="1352" height="352">
    </a>
    <!-- 銀座店 -->
    <a class="reserve-btn ginza" href="https://fashionista.skin/lp/" target="_blank" rel="noopener noreferrer" aria-label="銀座店 予約する">
      <img src="images/reserve.webp" alt="予約する" width="1352" height="352">
    </a>
    <!-- 表参道店 -->
    <a class="reserve-btn omotesando" href="https://vy5iy8.b-merit.jp/a5ib9s/web/coupon/" target="_blank" rel="noopener noreferrer" aria-label="表参道店 予約する">
      <img src="images/reserve.webp" alt="予約する" width="1352" height="352">
    </a>
    <!-- 新宿店 -->
    <a class="reserve-btn shinjuku" href="https://fashionista.skin/shibuya/" target="_blank" rel="noopener noreferrer" aria-label="新宿店 予約する">
      <img src="images/reserve.webp" alt="予約する" width="1352" height="352">
    </a>
    <!-- 横浜店 -->
    <a class="reserve-btn yokohama" href="https://fashionista.skin/nakameguro/" target="_blank" rel="noopener noreferrer" aria-label="横浜店 予約する">
      <img src="images/reserve.webp" alt="予約する" width="1352" height="352">
    </a>
    <!-- 大阪店 -->
    <a class="reserve-btn osaka" href="https://vy5iy8.b-merit.jp/a5ib9s/web/coupon/" target="_blank" rel="noopener noreferrer" aria-label="大阪店 予約する">
      <img src="images/reserve.webp" alt="予約する" width="1352" height="352">
    </a>
  </div>
</main>

</body>
</html>
