<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>glow by Fashionista｜毛穴洗浄×小顔ケア専門サロン</title>
<meta name="description" content="ノーファンデでも自信が持てる素肌へ。たった1回で変化を実感。glow by Fashionista 公式LP">
<link rel="preload" as="image" href="images/section1.webp">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    background: #fdf8f5;
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    background: #fff;
  }
  .lp-section {
    display: block;
    width: 100%;
    height: auto;
    margin: 0;
    padding: 0;
    vertical-align: top;
  }

  /* 9ページ目: 店舗ごとに予約ボタンをオーバーレイ */
  .stores {
    position: relative;
    line-height: 0;
  }
  .stores img.lp-section { position: relative; }
  .reserve-btn {
    position: absolute;
    right: 4%;
    width: 25%;
    transform: translateY(-50%);
    transition: transform 0.18s ease, filter 0.18s ease;
    filter: drop-shadow(0 4px 12px rgba(220, 80, 120, 0.3));
    line-height: 0;
  }
  .reserve-btn img { display: block; width: 100%; height: auto; }
  .reserve-btn:hover {
    transform: translateY(-50%) scale(1.05);
    filter: drop-shadow(0 6px 16px rgba(220, 80, 120, 0.45)) brightness(1.05);
  }
  .reserve-btn:active {
    transform: translateY(-50%) scale(0.98);
  }

  /* 店舗ごとの縦位置（住所の高さに合わせて配置） */
  .reserve-btn.ebisu      { top: 28.8%; }
  .reserve-btn.ginza      { top: 38.5%; }
  .reserve-btn.omotesando { top: 48.2%; }
  .reserve-btn.shinjuku   { top: 57.9%; }
  .reserve-btn.yokohama   { top: 67.6%; }
  .reserve-btn.osaka      { top: 77.3%; }
</style>
</head>
<body>

<main>
  <img class="lp-section" src="images/section1.webp" alt="glow by Fashionista｜もう、隠さない" width="1600" height="3459" fetchpriority="high">
  <img class="lp-section" src="images/section2.webp" alt="GLOWの特徴・強み" loading="lazy" width="1600" height="3459">
  <img class="lp-section" src="images/section3.webp" alt="施術内容・効果" loading="lazy" width="1600" height="3459">
  <img class="lp-section" src="images/section4.webp" alt="Before / After" loading="lazy" width="1600" height="3459">
  <img class="lp-section" src="images/section5.webp" alt="お客様の声" loading="lazy" width="1600" height="3459">
  <img class="lp-section" src="images/section6.webp" alt="料金・コース案内" loading="lazy" width="1600" height="3459">
  <img class="lp-section" src="images/section7.webp" alt="よくあるご質問" loading="lazy" width="1600" height="3459">
  <img class="lp-section" src="images/section8.webp" alt="ご予約・お問い合わせ" loading="lazy" width="1600" height="3459">

  <div class="stores">
    <img class="lp-section" src="images/section9.webp" alt="店舗一覧" loading="lazy" width="1600" height="3459">
    <a class="reserve-btn ebisu" href="https://fashionista.skin/ebisu-east/" target="_blank" rel="noopener noreferrer" aria-label="恵比寿店 予約する">
      <img src="images/reserve.webp" alt="予約する" width="1683" height="935">
    </a>
    <a class="reserve-btn ginza" href="https://fashionista.skin/nakameguro/" target="_blank" rel="noopener noreferrer" aria-label="銀座店 予約する">
      <img src="images/reserve.webp" alt="予約する" width="1683" height="935">
    </a>
    <a class="reserve-btn omotesando" href="https://vy5iy8.b-merit.jp/a5ib9s/web/coupon/" target="_blank" rel="noopener noreferrer" aria-label="表参道店 予約する">
      <img src="images/reserve.webp" alt="予約する" width="1683" height="935">
    </a>
    <a class="reserve-btn shinjuku" href="https://fashionista.skin/lp/" target="_blank" rel="noopener noreferrer" aria-label="新宿店 予約する">
      <img src="images/reserve.webp" alt="予約する" width="1683" height="935">
    </a>
    <a class="reserve-btn yokohama" href="https://fashionista.skin/shibuya/" target="_blank" rel="noopener noreferrer" aria-label="横浜店 予約する">
      <img src="images/reserve.webp" alt="予約する" width="1683" height="935">
    </a>
    <a class="reserve-btn osaka" href="https://vy5iy8.b-merit.jp/a5ib9s/web/coupon/" target="_blank" rel="noopener noreferrer" aria-label="大阪店 予約する">
      <img src="images/reserve.webp" alt="予約する" width="1683" height="935">
    </a>
  </div>
</main>

</body>
</html>
