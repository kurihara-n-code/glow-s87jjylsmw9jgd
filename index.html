<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>glow by Fashionista｜毛穴洗浄×小顔ケア専門サロン</title>
<meta name="description" content="ノーファンデでも自信が持てる素肌へ。たった1回で変化を実感。glow by Fashionista 公式LP">
<link rel="preload" as="image" href="images/section1.webp">
<link rel="preload" as="image" href="images/button2.png">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html {
    margin: 0;
    padding: 0;
    scroll-behavior: smooth;
  }
  body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    background: #fdf8f5;
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    background: #fff;
  }
  .lp-section {
    display: block;
    width: 100%;
    height: auto;
    margin: 0;
    padding: 0;
    vertical-align: top;
  }

  /* 店舗一覧: 店舗ごとに行を作りボタンを住所欄右側に配置 */
  .stores {
    background: #fff;
  }
  .store-row {
    position: relative;
    line-height: 0;
  }
  .store-row img.lp-section {
    width: 100%;
    height: auto;
    display: block;
  }
  .reserve-btn {
    position: absolute;
    top: 73.2609%;
    left: 59.4373%;
    width: 26.612%;
    transform: translateY(-50%);
    line-height: 0;
  }
  .store-row.ebisu .reserve-btn { top: 78.4444%; }
  .store-row.ginza .reserve-btn { top: 73.2609%; }
  .store-row.omotesando .reserve-btn { top: 67.1739%; }
  .store-row.shinjuku .reserve-btn { top: 76.0526%; }
  .store-row.yokohama .reserve-btn { top: 71.5217%; }
  .store-row.osaka .reserve-btn { top: 82.7273%; }
  .reserve-btn img {
    display: block;
    width: 100%;
    height: auto;
  }
  .floating-cta {
    position: fixed;
    left: 50%;
    bottom: max(12px, env(safe-area-inset-bottom));
    z-index: 100;
    display: block;
    width: min(70vw, 500px);
    transform: translateX(-50%);
    line-height: 0;
    transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s ease;
  }
  .floating-cta.is-hidden {
    visibility: hidden;
    opacity: 0;
    pointer-events: none;
    transform: translateX(-50%) translateY(16px);
  }
  .floating-cta img {
    display: block;
    width: 100%;
    height: auto;
  }
</style>
</head>
<body>

<main>
  <img class="lp-section" src="images/section1.webp" alt="glow by Fashionista｜もう、隠さない" width="853" height="1844" fetchpriority="high">
  <img class="lp-section" src="images/section2.webp" alt="たった1回で、変化を実感" loading="lazy" width="853" height="1844">
  <img class="lp-section" src="images/section3.webp" alt="素肌の輝きを引き出す" loading="lazy" width="853" height="1844">
  <img class="lp-section" src="images/section4.webp" alt="つるんと透明感のある鼻へ" loading="lazy" width="853" height="1844">
  <img class="lp-section" src="images/section5.webp" alt="Glowとは" loading="lazy" width="853" height="1844">
  <img class="lp-section" src="images/section6.webp" alt="人気メニュー" loading="lazy" width="853" height="1844">
  <img class="lp-section" src="images/section7.webp" alt="お客様の声" loading="lazy" width="853" height="1844">
  <img class="lp-section" src="images/section8.webp" alt="プラン・料金" loading="lazy" width="853" height="1844">

  <div id="store-list" class="stores">
    <!-- 店舗一覧ヘッダー -->
    <img class="lp-section" src="images/section9_header.webp" alt="店舗一覧" loading="lazy" width="853" height="365">

    <!-- 恵比寿店 -->
    <div class="store-row ebisu">
      <img class="lp-section" src="images/section9_ebisu.webp" alt="恵比寿店" loading="lazy" width="853" height="225">
      <a class="reserve-btn" href="https://fashionista.skin/ebisu-east/" target="_blank" rel="noopener noreferrer" aria-label="恵比寿店 予約する">
        <img src="images/reserve.webp" alt="予約する" width="1352" height="352">
      </a>
    </div>

    <!-- 銀座店 -->
    <div class="store-row ginza">
      <img class="lp-section" src="images/section9_ginza.webp" alt="銀座店" loading="lazy" width="853" height="230">
      <a class="reserve-btn" href="https://fashionista.skin/lp/" target="_blank" rel="noopener noreferrer" aria-label="銀座店 予約する">
        <img src="images/reserve.webp" alt="予約する" width="1352" height="352">
      </a>
    </div>

    <!-- 表参道店 -->
    <div class="store-row omotesando">
      <img class="lp-section" src="images/section9_omote.webp" alt="表参道店" loading="lazy" width="853" height="230">
      <a class="reserve-btn" href="https://vy5iy8.b-merit.jp/a5ib9s/web/coupon/" target="_blank" rel="noopener noreferrer" aria-label="表参道店 予約する">
        <img src="images/reserve.webp" alt="予約する" width="1352" height="352">
      </a>
    </div>

    <!-- 新宿店 -->
    <div class="store-row shinjuku">
      <img class="lp-section" src="images/section9_shinjuku.webp" alt="新宿店" loading="lazy" width="853" height="190">
      <a class="reserve-btn" href="https://fashionista.skin/shibuya/" target="_blank" rel="noopener noreferrer" aria-label="新宿店 予約する">
        <img src="images/reserve.webp" alt="予約する" width="1352" height="352">
      </a>
    </div>

    <!-- 横浜店 -->
    <div class="store-row yokohama">
      <img class="lp-section" src="images/section9_yokohama.webp" alt="横浜店" loading="lazy" width="853" height="230">
      <a class="reserve-btn" href="https://fashionista.skin/nakameguro/" target="_blank" rel="noopener noreferrer" aria-label="横浜店 予約する">

    <!-- 大阪店 -->
    <div class="store-row osaka">
      <img class="lp-section" src="images/section9_osaka.webp" alt="大阪店" loading="lazy" width="853" height="165">
      <a class="reserve-btn" href="https://vy5iy8.b-merit.jp/a5ib9s/web/coupon/" target="_blank" rel="noopener noreferrer" aria-label="大阪店 予約する">

    <!-- 店舗一覧フッター -->
    <img class="lp-section" src="images/section9_footer.webp" alt="全国に続々と展開予定" loading="lazy" width="853" height="209">
  </div>
</main>

<a class="floating-cta" href="#store-list" aria-label="店舗一覧へ移動して今すぐ予約する">
  <img src="images/button2.png" alt="今すぐ予約する" width="1732" height="350">
</a>

<script>
  const floatingCta = document.querySelector('.floating-cta');
  const storeList = document.querySelector('#store-list');

  if (floatingCta && storeList && 'IntersectionObserver' in window) {
    const observer = new IntersectionObserver((entries) => {
      const isStoreListVisible = entries.some((entry) => entry.isIntersecting);
      floatingCta.classList.toggle('is-hidden', isStoreListVisible);
    }, { threshold: 0.01 });

    observer.observe(storeList);
  }
</script>

</body>
</html>
